 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Love ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fecfef);
    font-family:Arial,sans-serif;
}

.container{
    text-align:center;
}

.heart{
    position:relative;
    width:300px;
    height:300px;
    transform:rotate(-45deg);
    margin:auto;
    overflow:hidden;
    animation:heartbeat 1.5s infinite;
    box-shadow:0 0 40px rgba(255,0,100,0.6);
}

.heart::before,
.heart::after{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:inherit;
    border-radius:50%;
}

.heart::before{
    top:-150px;
    left:0;
}

.heart::after{
    left:150px;
    top:0;
}

.heart img{
    width:450px;
    height:450px;
    object-fit:cover;
    transform:rotate(45deg);
    position:absolute;
    top:-75px;
    left:-75px;
}

@keyframes heartbeat{
    0%{
        transform:rotate(-45deg) scale(1);
    }
    50%{
        transform:rotate(-45deg) scale(1.1);
    }
    100%{
        transform:rotate(-45deg) scale(1);
    }
}

h1{
    margin-top:50px;
    color:#ff3366;
    font-size:40px;
}

p{
    color:#555;
    font-size:20px;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

    <div class="heart">
        her.jpg alt="My Girlfriend">
    </div>

    <h1>I Love You ❤️</h1>
    <p>
        Every heartbeat reminds me of you.<br>
        You are the most beautiful part of my life.
    </p>

</div>

</body>
</html>
